<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Training Room — XR Skills Analyzer</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: Arial, sans-serif; overflow: hidden; }

    .hud {
      position: fixed; z-index: 9999;
      border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; backdrop-filter: blur(10px);
      border: 1px solid rgba(167,139,250,0.35);
      transition: background 0.18s, transform 0.1s;
    }
    .hud:hover  { transform: scale(1.04); }
    .hud:active { transform: scale(0.97); }

    #back-btn {
      top: 16px; left: 16px;
      background: rgba(109,40,217,0.82);
      color: #fff; padding: 9px 18px;
    }
    #back-btn:hover { background: rgba(124,58,237,0.96); }

    #sound-btn {
      top: 16px; right: 16px;
      background: rgba(10,10,30,0.72);
      color: rgba(167,139,250,0.9);
      padding: 9px 14px; font-size: 17px;
    }

    #role-label {
      position: fixed; top: 16px; left: 50%;
      transform: translateX(-50%); z-index: 9999;
      background: rgba(5,5,20,0.75);
      color: rgba(196,181,253,0.95);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 10px; padding: 7px 22px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      backdrop-filter: blur(10px); white-space: nowrap;
      max-width: calc(100vw - 230px);
      overflow: hidden; text-overflow: ellipsis;
    }

    #hint {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%); z-index: 9999;
      color: rgba(255,255,255,0.32); font-size: 12px;
      pointer-events: none; white-space: nowrap; letter-spacing: 0.04em;
    }

    a-scene { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>

<button id="back-btn" class="hud" onclick="window.location.href='/'">← Back to Dashboard</button>
<div id="role-label">Loading…</div>
<button id="sound-btn" class="hud" title="Toggle ambient sound">🔇</button>
<div id="hint">Click &amp; drag to look around · Scroll to zoom</div>

<script>
'use strict';

// ── URL params ──────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const role   = params.get('role') || '';
let skills   = [];
try { skills = JSON.parse(decodeURIComponent(params.get('skills') || '[]')); } catch (_) {}

// ── HUD ─────────────────────────────────────────────────────────────────────
document.getElementById('role-label').textContent =
  role ? role + ' — VR Training Room' : 'XR Training Environment';

// ── Helpers ──────────────────────────────────────────────────────────────────
function gapColor(gap) {
  if (gap >= 5) return '#e11d48';
  if (gap >= 2) return '#eab308';
  return '#22c55e';
}
function gapTierLabel(gap) {
  if (gap >= 5) return 'CRITICAL';
  if (gap >= 2) return 'DEVELOPING';
  return 'READY';
}
function mkEl(tag, attrs) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, String(v));
  return e;
}
function mkPlane(attrs)  { return mkEl('a-plane',  attrs); }
function mkText(attrs)   { return mkEl('a-text',   attrs); }

// ── Scene loaded ─────────────────────────────────────────────────────────────
document.querySelector('a-scene').addEventListener('loaded', () => {

  // Welcome role name
  const wr = document.getElementById('welcome-role');
  if (wr) wr.setAttribute('value', role || 'Select a role on the dashboard');

  buildSkillCards();
  buildParticles();
});

// ════════════════════════════════════════════════════════════════════════════
// SKILL CARDS
// ════════════════════════════════════════════════════════════════════════════
function buildSkillCards() {
  const top3 = [...skills]
    .map(s => ({ ...s, gap: s.required - s.current }))
    .sort((a, b) => b.gap - a.gap)
    .slice(0, 3);

  const container = document.getElementById('skill-cards');

  if (top3.length === 0) {
    const fb = mkEl('a-entity', { position: '0 2.4 -7.85' });
    fb.appendChild(mkPlane({ width: 5.5, height: 2.2,
      material: 'color:#0d0d2b; opacity:0.92; transparent:true' }));
    fb.appendChild(mkText({
      value: 'Select an HR role on the\ndashboard to load skill cards',
      align: 'center', color: '#a78bfa', width: '5.0', position: '0 0 0.01',
      'wrap-count': '38',
    }));
    container.appendChild(fb);
    return;
  }

  // Card configs: back wall, left wall, right wall
  const CFGS = [
    { position: '0 2.5 -7.85',  rotation: '0 0 0'   },
    { position: '-7.85 2.5 0',  rotation: '0 90 0'  },
    { position: '7.85 2.5 0',   rotation: '0 -90 0' },
  ];

  const CW = 5.4;   // card width
  const CH = 4.0;   // card height
  const HH = CH / 2;

  top3.forEach((skill, idx) => {
    const cfg   = CFGS[idx];
    const color = gapColor(skill.gap);
    const label = gapTierLabel(skill.gap);
    const req   = skill.required ?? 0;
    const cur   = skill.current  ?? 0;
    const gapPts = skill.gap > 0
      ? `+${skill.gap} pts gap`
      : skill.gap < 0
        ? `Strength  +${Math.abs(skill.gap)}`
        : 'On Track';

    const wrap = mkEl('a-entity', { position: cfg.position, rotation: cfg.rotation });

    // ── Outer glow halo ──────────────────────────────────────────────────
    wrap.appendChild(mkPlane({
      width: CW + 0.5, height: CH + 0.5, position: `0 0 -0.05`,
      material: `color:${color}; emissive:${color}; emissiveIntensity:0.35; transparent:true; opacity:0.11; side:double`,
    }));

    // ── Card body ────────────────────────────────────────────────────────
    wrap.appendChild(mkPlane({
      width: CW, height: CH,
      material: 'color:#070722; transparent:true; opacity:0.96; side:double',
    }));

    // ── Top color bar ────────────────────────────────────────────────────
    wrap.appendChild(mkPlane({
      width: CW, height: 0.10, position: `0 ${HH - 0.05} 0.005`,
      material: `color:${color}; emissive:${color}; emissiveIntensity:0.9`,
    }));

    // ── Badge: card number ────────────────────────────────────────────────
    wrap.appendChild(mkText({
      value: `#${idx + 1}`, align: 'left', color,
      width: '1.5', position: `${-HH + 0.28} ${HH - 0.40} 0.01`,
      'wrap-count': '4',
    }));

    // ── Badge: tier label ─────────────────────────────────────────────────
    wrap.appendChild(mkText({
      value: label, align: 'right', color,
      width: '2.0', position: `${HH - 0.22} ${HH - 0.40} 0.01`,
      'wrap-count': '12',
    }));

    // ── Skill name ────────────────────────────────────────────────────────
    wrap.appendChild(mkText({
      value: skill.skill,
      align: 'center', color: '#ede9fe',
      width: String(CW - 0.3),
      position: `0 ${HH - 1.02} 0.01`,
      font: 'https://cdn.aframe.io/fonts/Exo2Bold.fnt',
      'wrap-count': '26',
    }));

    // ── Divider under skill name ──────────────────────────────────────────
    wrap.appendChild(mkPlane({
      width: CW - 0.55, height: 0.028, position: `0 ${HH - 1.46} 0.01`,
      material: `color:${color}; emissive:${color}; emissiveIntensity:0.7; transparent:true; opacity:0.6`,
    }));

    // ── Score row ────────────────────────────────────────────────────────
    wrap.appendChild(mkText({
      value: `Required:  ${req} / 10`, align: 'left', color: '#94a3b8',
      width: '3.0', position: `${-CW/2 + 0.35} ${HH - 1.82} 0.01`,
      'wrap-count': '20',
    }));
    wrap.appendChild(mkText({
      value: `Current:  ${cur} / 10`, align: 'right', color: '#94a3b8',
      width: '3.0', position: `${CW/2 - 0.35} ${HH - 1.82} 0.01`,
      'wrap-count': '18',
    }));

    // ── Status bar ───────────────────────────────────────────────────────
    const barW  = CW - 0.65;         // track width
    const barY  = HH - 2.20;         // y position of bar row
    const fillW = Math.max(0.04, (cur / 10) * barW);
    const fillX = -barW / 2 + fillW / 2;
    const reqX  = -barW / 2 + (req / 10) * barW;

    // Track
    wrap.appendChild(mkPlane({
      width: barW, height: 0.175, position: `0 ${barY} 0.01`,
      material: 'color:#16163e; transparent:true; opacity:0.95',
    }));
    // Current fill
    wrap.appendChild(mkPlane({
      width: fillW, height: 0.175, position: `${fillX} ${barY} 0.015`,
      material: `color:${color}; emissive:${color}; emissiveIntensity:0.55`,
    }));
    // Required marker (white tick)
    wrap.appendChild(mkPlane({
      width: 0.065, height: 0.30, position: `${reqX} ${barY} 0.02`,
      material: 'color:#ffffff; emissive:#ffffff; emissiveIntensity:1; transparent:true; opacity:0.92',
    }));

    // Bar legend
    wrap.appendChild(mkText({
      value: 'filled = current   |   line = required',
      align: 'center', color: '#3d3d60',
      width: String(barW),
      position: `0 ${HH - 2.43} 0.01`,
      'wrap-count': '44',
    }));

    // ── Gap value ────────────────────────────────────────────────────────
    wrap.appendChild(mkText({
      value: gapPts, align: 'center', color,
      width: '3.6', position: `0 ${HH - 2.88} 0.01`,
      font: 'https://cdn.aframe.io/fonts/Exo2Bold.fnt',
      'wrap-count': '22',
    }));

    // ── Bottom divider ───────────────────────────────────────────────────
    wrap.appendChild(mkPlane({
      width: CW - 0.55, height: 0.022, position: `0 ${HH - 3.22} 0.01`,
      material: `color:${color}; transparent:true; opacity:0.38`,
    }));

    // ── Insight text ──────────────────────────────────────────────────────
    const ins = (skill.insight || '').length > 95
      ? skill.insight.slice(0, 93) + '…'
      : (skill.insight || '');
    wrap.appendChild(mkText({
      value: ins, align: 'center', color: '#4a4a72',
      width: String(CW - 0.45),
      position: `0 ${HH - 3.65} 0.01`,
      'wrap-count': '48',
    }));

    // ── Bottom color bar ─────────────────────────────────────────────────
    wrap.appendChild(mkPlane({
      width: CW, height: 0.075, position: `0 ${-HH + 0.038} 0.005`,
      material: `color:${color}; emissive:${color}; emissiveIntensity:0.7; transparent:true; opacity:0.5`,
    }));

    // ── Hover scale ───────────────────────────────────────────────────────
    wrap.setAttribute('animation__in',
      'property: scale; to: 1.04 1.04 1.04; dur: 200; startEvents: mouseenter; easing: easeOutQuad');
    wrap.setAttribute('animation__out',
      'property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave; easing: easeOutQuad');

    container.appendChild(wrap);
  });
}

// ════════════════════════════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ════════════════════════════════════════════════════════════════════════════
function buildParticles() {
  const pc     = document.getElementById('particles');
  const COLS   = ['#7c3aed','#6d28d9','#4f46e5','#0ea5e9','#a855f7','#8b5cf6','#3b82f6'];
  const COUNT  = 32;

  for (let i = 0; i < COUNT; i++) {
    const x    = (Math.random() - 0.5) * 14;
    const z    = (Math.random() - 0.5) * 14;
    const r    = 0.022 + Math.random() * 0.048;
    const dur  = 3800 + Math.random() * 5800;
    const dly  = Math.floor(Math.random() * 4500);
    const col  = COLS[Math.floor(Math.random() * COLS.length)];
    const topY = 0.8 + Math.random() * 3.4;

    const p = mkEl('a-sphere', {
      radius: r,
      position: `${x} 0.08 ${z}`,
      material: `color:${col}; emissive:${col}; emissiveIntensity:0.9; transparent:true; opacity:0.75`,
      'animation__rise':
        `property: position; from: ${x} 0.08 ${z}; to: ${x} ${topY} ${z};` +
        `dur: ${dur}; loop: true; dir: alternate; delay: ${dly}; easing: easeInOutSine`,
      'animation__fade':
        `property: material.opacity; from: 0.85; to: 0.02;` +
        `dur: ${dur}; loop: true; dir: alternate; delay: ${dly}; easing: easeInSine`,
    });
    pc.appendChild(p);
  }
}

// ════════════════════════════════════════════════════════════════════════════
// CINEMATIC CAMERA PAN
// ════════════════════════════════════════════════════════════════════════════
let cinematicOn   = true;
let lastInteract  = 0;
const RESUME_DELAY = 2600;   // ms of stillness before resuming
const ROT_SPEED   = 1.6;     // degrees / second

document.addEventListener('mousedown',  () => { cinematicOn = false; lastInteract = Date.now(); });
document.addEventListener('touchstart', () => { cinematicOn = false; lastInteract = Date.now(); }, { passive: true });
document.addEventListener('mouseup',    () => { lastInteract = Date.now(); });
document.addEventListener('touchend',   () => { lastInteract = Date.now(); });

let prevTS = 0;
function cinematicLoop(ts) {
  if (!cinematicOn && (Date.now() - lastInteract) > RESUME_DELAY) cinematicOn = true;

  if (cinematicOn) {
    const dt  = Math.min((ts - prevTS) / 1000, 0.05);
    const rig = document.querySelector('#rig');
    if (rig) {
      const rot = rig.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
      rig.setAttribute('rotation', { x: rot.x, y: (rot.y || 0) + ROT_SPEED * dt, z: rot.z });
    }
  }
  prevTS = ts;
  requestAnimationFrame(cinematicLoop);
}
requestAnimationFrame(cinematicLoop);

// ════════════════════════════════════════════════════════════════════════════
// WEB AUDIO — ambient futuristic hum
// ════════════════════════════════════════════════════════════════════════════
let audioCtx   = null;
let masterGain = null;
let soundOn    = false;
let audioBuilt = false;

function buildAudio() {
  if (audioBuilt) return;
  audioBuilt = true;
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();

  const filter = audioCtx.createBiquadFilter();
  filter.type  = 'lowpass';
  filter.frequency.value = 290;
  filter.Q.value = 2.0;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;

  filter.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  // Layered oscillators for a rich drone
  [
    { type: 'sine',     freq: 55,   vol: 0.12 },
    { type: 'sine',     freq: 110,  vol: 0.06 },
    { type: 'triangle', freq: 82.5, vol: 0.05 },
    { type: 'sine',     freq: 165,  vol: 0.025 },
    { type: 'sawtooth', freq: 27.5, vol: 0.03 },
  ].forEach(({ type, freq, vol }) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq; g.gain.value = vol;
    o.connect(g); g.connect(filter); o.start();
  });

  // Slow filter sweep — "breathing" quality
  (function sweep() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    filter.frequency.setTargetAtTime(240 + 90 * Math.sin(t * 0.22), t, 1.0);
    setTimeout(sweep, 900);
  })();
}

function enableSound() {
  buildAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  soundOn = true;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.setTargetAtTime(1, audioCtx.currentTime, 1.8);
  document.getElementById('sound-btn').textContent = '🔊';
}
function disableSound() {
  if (!masterGain) return;
  soundOn = false;
  masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.9);
  document.getElementById('sound-btn').textContent = '🔇';
}

document.getElementById('sound-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  soundOn ? disableSound() : enableSound();
});

// Auto-start on first user gesture
let audioStarted = false;
document.addEventListener('click', function autoStart() {
  if (!audioStarted) { audioStarted = true; enableSound(); }
  document.removeEventListener('click', autoStart);
}, { capture: true });
</script>
